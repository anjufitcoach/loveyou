<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kavleen 🤍</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Georgia, serif;
}

/* Video background */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: 0;
}

/* Overlay */
.overlay {
  position: relative;
  z-index: 1;
  height: 100vh;
  width: 100vw;
  background: rgba(0,0,0,0.45);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
  padding: 20px;
}

.content {
  max-width: 700px;
}

h1 {
  font-size: 3rem;
  margin-bottom: 20px;
}

p {
  font-size: 1.2rem;
  line-height: 1.8;
}

button {
  margin-top: 25px;
  padding: 12px 30px;
  border-radius: 30px;
  border: 1px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
  font-size: 1rem;
}

button:hover {
  background: white;
  color: black;
}

.hidden {
  display: none;
  margin-top: 20px;
}

.finalLove {
  position: fixed;
  bottom: 15%;
  width: 100%;
  text-align: center;
  font-size: 2rem;
  color: white;
  opacity: 0;
  transition: opacity 3s ease;
  z-index: 2;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
  <source src="ourvideo.mp4" type="video/mp4">
</video>

<div class="overlay">
  <div class="content">
    <h1>Kavleen 🤍</h1>

    <p>
      Mujhse ek choti si galti ho gayi…  
      Par tum meri life mein choti nahi ho.
    </p>

    <p>
      Main sirf itna chahta hoon  
      ki tum hamesha smile karo.
    </p>

    <button onclick="showMessage()">Bas ek baat aur…</button>

    <div class="hidden" id="extra">
      Main sach mein sorry hoon. 🤍
    </div>
  </div>
</div>

<div class="finalLove" id="finalLove">
  I love you, Kavleen 🤍
</div>

<script>
function showMessage() {
  document.getElementById("extra").style.display = "block";
  setTimeout(function(){
    document.getElementById("finalLove").style.opacity = "1";
  }, 2000);
}
</script>

</body>
</html>
